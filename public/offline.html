<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SOP - Modo Offline</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #faf8f6 0%, #f5f3f0 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .container {
      background: white;
      border-radius: 12px;
      box-shadow: 0 20px 60px rgba(196, 20, 50, 0.1);
      padding: 40px;
      max-width: 500px;
      text-align: center;
    }

    .icon {
      width: 80px;
      height: 80px;
      margin: 0 auto 30px;
      background: linear-gradient(135deg, #c41432 0%, #a01028 100%);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 40px;
    }

    h1 {
      color: #0a0a0a;
      margin-bottom: 15px;
      font-size: 28px;
      font-weight: 700;
    }

    p {
      color: #666;
      line-height: 1.6;
      margin-bottom: 30px;
      font-size: 16px;
    }

    .tips {
      background: linear-gradient(135deg, rgba(196, 20, 50, 0.05) 0%, rgba(196, 20, 50, 0.02) 100%);
      border: 1px solid rgba(196, 20, 50, 0.1);
      border-radius: 8px;
      padding: 20px;
      text-align: left;
      margin-top: 20px;
    }

    .tips h3 {
      color: #c41432;
      font-size: 14px;
      margin-bottom: 10px;
      font-weight: 600;
      text-transform: uppercase;
    }

    .tips ul {
      list-style: none;
      color: #666;
      font-size: 14px;
    }

    .tips li {
      padding: 6px 0;
      display: flex;
      align-items: center;
    }

    .tips li:before {
      content: "✓";
      color: #c41432;
      font-weight: bold;
      margin-right: 8px;
    }

    .button {
      background: linear-gradient(135deg, #c41432 0%, #a01028 100%);
      color: white;
      border: none;
      padding: 12px 32px;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      margin-top: 20px;
    }

    .button:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 30px rgba(196, 20, 50, 0.3);
    }

    .button:active {
      transform: translateY(0);
    }

    @media (prefers-color-scheme: dark) {
      body {
        background: linear-gradient(135deg, #1a1a1a 0%, #0f0f0f 100%);
      }

      .container {
        background: #1f1f1f;
        box-shadow: 0 20px 60px rgba(196, 20, 50, 0.2);
      }

      h1 {
        color: #fff;
      }

      p {
        color: #aaa;
      }

      .tips {
        background: rgba(196, 20, 50, 0.08);
        border-color: rgba(196, 20, 50, 0.15);
      }

      .tips ul {
        color: #aaa;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">📡</div>
    <h1>Você está offline</h1>
    <p>A conexão com a internet foi perdida. Tente reconectar ou volte quando tiver conexão disponível.</p>

    <div class="tips">
      <h3>O que você pode fazer:</h3>
      <ul>
        <li>Verifique sua conexão com a internet</li>
        <li>Tente novamente em alguns momentos</li>
        <li>Consulte o ícone de sinal no seu dispositivo</li>
      </ul>
    </div>

    <button class="button" onclick="window.location.reload()">
      Tentar novamente
    </button>
  </div>
</body>
</html>
